<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Колесо фортуны FINAL</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #222, #000);
  color: white;
  text-align: center;
}

canvas {
  width: 90vw;
  max-width: 400px;
  background: white;
  border-radius: 50%;
}

input, button {
  margin: 5px;
  padding: 6px;
  border-radius: 6px;
  border: none;
}

button { background: gold; cursor: pointer; }

#pointer {
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 25px solid red;
  margin: 10px auto;
}

#list {
  max-width: 450px;
  margin: auto;
  text-align: left;
}

.item {
  display: flex;
  gap: 5px;
  margin: 5px 0;
  align-items: center;
}

.item input[type="text"] { flex: 1; }

input[type="range"] { width: 100%; }
</style>
</head>

<body>

<h2>🎰 Колесо фортуны FINAL</h2>

<input id="name" placeholder="Вариант">
<input id="weight" type="number" value="1" min="1" style="width:60px">
<input id="color" type="color" value="#ff0000">
<button onclick="addOption()">Добавить</button>

<div>
🎛 Скорость: <span id="speedVal">20</span>
<input id="speed" type="range" min="5" max="50" value="20">
</div>

<div>
⏱ Время: <span id="timeVal">5</span> сек
<input id="time" type="range" min="2" max="15" value="5">
</div>

<label>
<input type="checkbox" id="eliminationMode">
🎮 Режим выбывания
</label>

<br>
<button onclick="spin()">Крутить</button>

<div id="pointer"></div>
<canvas id="wheel" width="400" height="400"></canvas>

<h3>📋 Призы</h3>
<div id="list"></div>

<audio id="tick" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-mechanical-bling-210.wav"></audio>
<audio id="win" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.wav"></audio>

<script>
const nameInput = document.getElementById("name");
const weightInput = document.getElementById("weight");
const colorInput = document.getElementById("color");
const list = document.getElementById("list");

const speedInput = document.getElementById("speed");
const timeInput = document.getElementById("time");

const tickSound = document.getElementById("tick");
const winSound = document.getElementById("win");
const eliminationMode = document.getElementById("eliminationMode");

let options = JSON.parse(localStorage.getItem("wheel")) || [
  {name:"A", weight:1, color:"#ff0000", active:true},
  {name:"B", weight:1, color:"#00ff00", active:true}
];

let startAngle = 0;
let spinTime = 0;
let spinTotal = 0;
let arc = 0;
let lastTick = -1;

const ctx = document.getElementById("wheel").getContext("2d");

function save() {
  localStorage.setItem("wheel", JSON.stringify(options));
}

/* sliders */
speedInput.oninput = () => speedVal.innerText = speedInput.value;
timeInput.oninput = () => timeVal.innerText = timeInput.value;

/* список */
function renderList() {
  list.innerHTML = "";

  options.forEach((o,i)=>{
    let div = document.createElement("div");
    div.className="item";

    if (!o.active) div.style.opacity="0.5";

    div.innerHTML = `
      <input value="${o.name}" onchange="editName(${i},this.value)">
      <input type="number" value="${o.weight}" min="1" style="width:60px"
        onchange="editWeight(${i},this.value)">
      <input type="color" value="${o.color}"
        onchange="editColor(${i},this.value)">
      <button onclick="toggleActive(${i})">${o.active ? "🚫" : "✅"}</button>
      <button onclick="removeOption(${i})">❌</button>
    `;

    list.appendChild(div);
  });
}

function editName(i,v){ options[i].name=v; save(); draw(); }
function editWeight(i,v){ options[i].weight=Number(v); save(); draw(); }
function editColor(i,v){ options[i].color=v; save(); draw(); }

function toggleActive(i){
  options[i].active=!options[i].active;
  save(); renderList(); draw();
}

function addOption() {
  if (!nameInput.value) return;

  options.push({
    name: nameInput.value,
    weight: Number(weightInput.value),
    color: colorInput.value,
    active: true
  });

  nameInput.value = "";

  save(); renderList(); draw();
}

function removeOption(i){
  options.splice(i,1);
  save(); renderList(); draw();
}

/* колесо */
function getWeightedArray(){
  let arr=[];
  options.forEach(o=>{
    if(!o.active) return;
    for(let i=0;i<o.weight;i++) arr.push(o);
  });
  return arr;
}

function draw(){
  let arr=getWeightedArray();
  if(!arr.length) return;

  arc=Math.PI*2/arr.length;
  ctx.clearRect(0,0,400,400);

  arr.forEach((o,i)=>{
    let angle=startAngle+i*arc;

    ctx.fillStyle=o.color;

    ctx.beginPath();
    ctx.moveTo(200,200);
    ctx.arc(200,200,200,angle,angle+arc);
    ctx.fill();

    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(angle+arc/2);

    let fontSize=Math.max(12,Math.min(26,200/arr.length));
    ctx.font=`bold ${fontSize}px Arial`;

    ctx.strokeStyle="white";
    ctx.lineWidth=3;

    ctx.fillStyle = "black";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
	
    wrapText(ctx,o.name,120,0,100,fontSize+2);

    ctx.restore();
  });
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
  let words=text.split(" "), line="", lines=[];

  words.forEach(w=>{
    let test=line+w+" ";
    if(ctx.measureText(test).width>maxWidth){
      lines.push(line);
      line=w+" ";
    } else line=test;
  });
  lines.push(line);

  let offset=(lines.length-1)*lineHeight/2;

  lines.forEach((l,i)=>{
    ctx.strokeText(l,x,y-offset+i*lineHeight);
    ctx.fillText(l,x,y-offset+i*lineHeight);
  });
}

function spin(){
  spinTime=0;
  spinTotal=timeInput.value*1000;
  window.baseSpeed=Number(speedInput.value);
  requestAnimationFrame(rotate);
}

function rotate(){
  spinTime+=16;

  if(spinTime>=spinTotal){ stop(); return; }

  let p=spinTime/spinTotal;
  let angle=baseSpeed*(1-Math.pow(p,3));

  startAngle+=angle*Math.PI/180;

  tick(); draw();
  requestAnimationFrame(rotate);
}

function tick(){
  let seg=Math.floor((startAngle%(2*Math.PI))/arc);
  if(seg!==lastTick){
    tickSound.currentTime=0;
    tickSound.play();
    lastTick=seg;
  }
}

function stop(){
  let arr=getWeightedArray();
  if(!arr.length) return;

  let deg=startAngle*180/Math.PI+90;
  let arcd=arc*180/Math.PI;

  let index=Math.floor((360-deg%360)/arcd);
  let result=arr[index];

  winSound.play();
  confetti();

  setTimeout(()=>{
    alert("Выпало: "+result.name);

    if(eliminationMode.checked){
      let found=options.find(o=>o.name===result.name);
      if(found) found.active=false;

      save(); renderList(); draw();
    }
  },300);
}

function confetti(){
  for(let i=0;i<80;i++){
    let d=document.createElement("div");
    d.style.position="fixed";
    d.style.width="6px";
    d.style.height="6px";
    d.style.background=`hsl(${Math.random()*360},100%,50%)`;
    d.style.top="0";
    d.style.left=Math.random()*100+"%";
    d.style.transition="2s";
    document.body.appendChild(d);

    setTimeout(()=>{d.style.top="100%";d.style.opacity=0;},10);
    setTimeout(()=>d.remove(),2000);
  }
}

renderList();
draw();
</script>

</body>
</html>
